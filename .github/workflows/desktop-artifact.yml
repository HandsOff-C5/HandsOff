name: Desktop artifact

# Builds the macOS desktop artifact on merge to main and on demand — NOT a
# per-PR blocker. Becomes a real Tauri build once apps/desktop/src-tauri/Cargo.toml
# lands (issue #15). Until then it no-ops cleanly so the workflow stays green.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - ".github/workflows/desktop-artifact.yml"

permissions:
  contents: read

jobs:
  build:
    name: build macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Build Tauri app (when scaffolded)
        run: |
          if [ -f apps/desktop/src-tauri/Cargo.toml ]; then
            echo "Tauri app present — building…"
            # TODO(#15): rustup + `pnpm --filter @handsoff/desktop-app tauri build`
            # then upload the .dmg/.app via actions/upload-artifact.
            echo "::warning::Tauri build step not yet wired — see issue #15."
          else
            echo "Tauri app not scaffolded yet (issue #15) — skipping artifact build."
          fi
